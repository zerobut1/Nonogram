<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数织游戏 - Nonogram</title>
  </head>
  <body data-theme="ink">
    <div id="app">
      <aside class="app-sidebar">
        <div class="brand">
          <div class="brand-mark">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="brand-copy">
            <strong>数织</strong>
            <span>YUTREL STUDIO</span>
          </div>
        </div>

        <nav class="nav-section">
          <button class="nav-item">
            <span class="nav-icon">⌂</span>
            <span>首页</span>
          </button>
          <button class="nav-item">
            <span class="nav-icon">◫</span>
            <span>每日挑战</span>
          </button>
          <button class="nav-item active">
            <span class="nav-icon">▦</span>
            <span>开始游戏</span>
          </button>
          <button class="nav-item">
            <span class="nav-icon">✦</span>
            <span>图鉴收藏</span>
          </button>
          <button class="nav-item">
            <span class="nav-icon">?</span>
            <span>玩法说明</span>
          </button>
        </nav>

        <div class="sidebar-card">
          <p class="sidebar-label">今日推荐</p>
          <h2>Chapter 5</h2>
          <p>从 5x5 到 15x15，逐步解锁更复杂的像素谜题。</p>
          <button id="btn-menu" class="btn btn-accent">选择谜题</button>
        </div>

        <div class="sidebar-footer">
          <button class="ghost-link">设置</button>
          <button class="ghost-link">控制说明</button>
        </div>
      </aside>

      <main class="playground">
        <section class="board-stage">
          <header class="stage-topbar">
            <div>
              <h1 id="current-puzzle-title">爱心</h1>
            </div>
          </header>

          <div class="board-shell">
            <div class="game-board-wrapper">
              <canvas id="game-canvas"></canvas>
            </div>

            <footer class="board-footer">
              <div class="board-status">
                <span>计时</span>
                <strong id="timer">00:00</strong>
              </div>
              <div class="board-status">
                <span>完成度</span>
                <strong id="progress">0%</strong>
              </div>
              <div class="board-status">
                <span>快捷键</span>
                <strong>Space</strong>
              </div>
            </footer>
          </div>
        </section>

        <aside class="control-rail">
          <section class="rail-panel">
            <div class="panel-heading">
              <p class="eyebrow">输入方式</p>
              <h3>操作面板</h3>
            </div>
            <div class="mode-stack">
              <button id="mode-fill" class="btn tool-btn active">填充 ■</button>
              <button id="mode-mark" class="btn tool-btn">标记 ✕</button>
            </div>
            <p class="panel-note">左键和拖拽会按当前工具连续填写，适合快速清图。</p>
          </section>

        </aside>
      </main>

      <div id="menu-modal" class="modal hidden">
        <div class="modal-content">
          <h2>选择谜题</h2>
          <div class="difficulty-tabs">
            <button class="tab active" data-difficulty="all">全部</button>
            <button class="tab" data-difficulty="easy">简单</button>
            <button class="tab" data-difficulty="medium">中等</button>
            <button class="tab" data-difficulty="hard">困难</button>
          </div>
          <div id="puzzle-list" class="puzzle-list"></div>
          <button id="btn-close-menu" class="btn close-btn">关闭</button>
        </div>
      </div>

      <div id="win-modal" class="modal hidden">
        <div class="modal-content">
          <h2>恭喜完成</h2>
          <p>你已经解开了当前像素谜题。</p>
          <div class="win-stats">
            <p>用时: <span id="win-time">00:00</span></p>
          </div>
          <button id="btn-next" class="btn primary">下一个谜题</button>
          <button id="btn-close-win" class="btn">关闭</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
